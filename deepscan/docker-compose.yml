# ============================================================================
# DeepScan Enhanced Task 1.5 — Real-Time Logs + ML Anomaly Detection
# docker compose up --build
# ============================================================================

services:

  # ── Elasticsearch 8.15 (single-node, ML enabled) ──────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: deepscan-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.ml.enabled=true
      - xpack.license.self_generated.type=trial
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=deepscan
      - node.name=deepscan-node
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    mem_limit: 1g

  # ── Kibana 8.15 ───────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: deepscan-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - xpack.encryptedSavedObjects.encryptionKey=a]3@kf9!2xR0pQ7#vLm8sNwYcZdT1bGe
      - server.publicBaseUrl=http://localhost:5601
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
    restart: unless-stopped
    mem_limit: 1g

  # ── Falco (eBPF modern driver, JSON output → falcosidekick) ───────────────
  falco:
    image: falcosecurity/falco-no-driver:0.39.2
    container_name: deepscan-falco
    privileged: true
    volumes:
      - ./configs/falco.yaml:/etc/falco/falco.yaml:ro
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command: ["/usr/bin/falco", "--modern-bpf", "-c", "/etc/falco/falco.yaml"]
    depends_on:
      - falcosidekick
    restart: unless-stopped
    mem_limit: 128m
    labels:
      deepscan.component: "falco"

  # ── falcosidekick (Falco → Elasticsearch bridge) ──────────────────────────
  # Reference: https://github.com/falcosecurity/falcosidekick
  falcosidekick:
    image: falcosecurity/falcosidekick:2.30.0
    container_name: deepscan-sidekick
    environment:
      # Elasticsearch output
      - ELASTICSEARCH_HOSTPORT=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=deepscan-falco
      - ELASTICSEARCH_TYPE=_doc
      - ELASTICSEARCH_BATCHING_ENABLED=true
      - ELASTICSEARCH_BATCHING_BATCHSIZE=5
      - ELASTICSEARCH_BATCHING_FLUSHINTERVAL=2
      - ELASTICSEARCH_CREATEINDEXTEMPLATE=true
      - ELASTICSEARCH_FLATTENFIELDS=true
      # Custom fields for correlation
      - CUSTOMFIELDS_ENVIRONMENT=deepscan
      - CUSTOMFIELDS_PIPELINE=real-time
      # Sidekick debug
      - DEBUG=false
    ports:
      - "2801:2801"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2801/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 64m

  # ── Fluent Bit (structured log collector → Elasticsearch) ─────────────────
  fluentbit:
    image: fluent/fluent-bit:3.1
    container_name: deepscan-fluentbit
    volumes:
      - ./configs/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./configs/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: deepscan-postgres
    environment:
      - POSTGRES_USER=deepscan
      - POSTGRES_PASSWORD=deepscan_secret
      - POSTGRES_DB=deepscan
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepscan"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 256m

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: deepscan-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 64m

  # ── FastAPI Application (ML router + /connect) ────────────────────────────
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: deepscan-api
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - POSTGRES_URL=postgresql://deepscan:deepscan_secret@postgres:5432/deepscan
      - REDIS_URL=redis://redis:6379
      - KIBANA_URL=http://localhost:5601
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    # Logs go to Fluent Bit via stdout (Docker log driver)
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "deepscan.api"

  # ── Example Target Node.js App ────────────────────────────────────────────
  example-target:
    build:
      context: ./example-target
      dockerfile: Dockerfile
    container_name: deepscan-target
    ports:
      - "3000:3000"
    restart: unless-stopped
    mem_limit: 128m
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "deepscan.target"

volumes:
  es_data:
    driver: local
  pg_data:
    driver: local
