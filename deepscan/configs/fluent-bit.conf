# ============================================================================
# Fluent Bit Configuration — DeepScan Enhanced Task 1.5
# Collects container logs → Elasticsearch (deepscan-logs index)
# ============================================================================

[SERVICE]
    Flush         1
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ── Input: Forward protocol (Docker fluentd log driver) ─────────────────────
[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Tag           deepscan.*

# ── Filter: Parse JSON from container stdout ────────────────────────────────
[FILTER]
    Name          parser
    Match         deepscan.*
    Key_Name      log
    Parser        docker_json
    Reserve_Data  On
    Preserve_Key  On

# ── Filter: Add ECS-compatible fields ───────────────────────────────────────
[FILTER]
    Name          modify
    Match         deepscan.*
    Add           event.dataset     deepscan
    Add           event.module      deepscan
    Add           ecs.version       8.11.0

# ── Filter: Extract scan_id from record if present ──────────────────────────
[FILTER]
    Name          lua
    Match         deepscan.*
    script        /fluent-bit/etc/add_scan_id.lua
    call          add_scan_id

# ── Output: Elasticsearch (deepscan-logs index) ─────────────────────────────
[OUTPUT]
    Name              es
    Match             deepscan.*
    Host              elasticsearch
    Port              9200
    Index             deepscan-logs
    Suppress_Type_Name On
    Logstash_Format   Off
    Generate_ID       On
    Replace_Dots      On
    Retry_Limit       5
    Buffer_Size       512KB
    tls               Off
