<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRE — Security Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07070d;
            --surface: #0f0f18;
            --surface2: #161625;
            --border: #1e1e32;
            --accent: #00ff88;
            --accent-dim: #00cc6e;
            --accent-glow: rgba(0,255,136,0.15);
            --text: #e0e0e0;
            --text-dim: #666;
            --danger: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(0,100,255,0.03) 0%, transparent 60%);
        }
        .container { max-width: 560px; width: 100%; }
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header h1 {
            font-size: 3rem;
            color: var(--accent);
            letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(0,255,136,0.25);
            margin-bottom: 12px;
        }
        .header p {
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .card h2 {
            color: var(--accent);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .input-group input::placeholder {
            color: var(--text-dim);
        }
        .options {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .option-group {
            flex: 1;
        }
        .option-group label.group-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: var(--accent);
        }
        .btn-start {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-start:hover {
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
            transform: translateY(-1px);
        }
        .btn-start:active {
            transform: translateY(0);
        }
        .note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.65rem;
            color: var(--text-dim);
            line-height: 1.6;
        }
        .note strong { color: var(--accent); }

        /* Hidden consent fields auto-checked */
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>▌SPECTRE▐</h1>
            <p>Security Penetration Engine with Closed-loop Threat Response</p>
        </div>

        <form action="/api/session" method="POST" class="card">
            <h2>▸ Enter Target</h2>
            
            <div class="input-group">
                <label>TARGET URL</label>
                <input type="url" name="target_url" placeholder="https://example.com" required autofocus>
            </div>

            <div class="options">
                <div class="option-group">
                    <label class="group-label">SCOPE</label>
                    <select name="scope">
                        <option value="web+server" selected>Web + Server</option>
                        <option value="web">Web Only</option>
                        <option value="server">Server Only</option>
                    </select>
                </div>
                <div class="option-group">
                    <label class="group-label">INTENSITY</label>
                    <select name="intensity">
                        <option value="light">Light</option>
                        <option value="standard" selected>Standard</option>
                        <option value="thorough">Thorough</option>
                    </select>
                </div>
            </div>

            <!-- Auto-checked hidden consent fields (still validated server-side) -->
            <div class="hidden">
                <input type="checkbox" name="consent_sandbox" checked>
                <input type="checkbox" name="consent_fakedb" checked>
                <input type="checkbox" name="consent_auth" checked>
                <input type="checkbox" name="consent_load" checked>
                <input type="checkbox" name="consent_responsibility" checked>
                <input type="text" name="participant_name" value="operator">
                <input type="text" name="organization" value="SPECTRE">
            </div>

            <button type="submit" class="btn-start">▶ START ASSESSMENT</button>
        </form>

        <p class="note">
            <strong>⚠</strong> Only test systems you own or have authorization to scan.<br>
            SPECTRE will perform active reconnaissance and attack simulations.
        </p>
    </div>
</body>
</html>
